name: Terraform Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      # Stage: checkout
      - name: Checkout repository
        uses: actions/checkout@v3

      # Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6   # Change to your version if needed

      # Stage: init
      - name: Terraform Init
        working-directory: Day-2-sample-base-code
        run: terraform init

      # Stage: plan
      - name: Terraform Plan
        working-directory: Day-2-sample-base-code
        run: terraform plan

      # Stage: apply (only on push to main, not on PR)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        working-directory: Day-2-sample-base-code
        run: terraform apply -auto-approve
